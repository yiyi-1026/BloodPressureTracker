name: BloodPressureTracker
options:
  bundleIdPrefix: com.bloodpressure
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: "UX83PSSW78"
  CODE_SIGN_IDENTITY: "Apple Development"
  CODE_SIGN_STYLE: "Automatic"
targets:
  BloodPressureTracker:
    type: application
    platform: iOS
    sources:
      - BloodPressureTracker
    settings:
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
      INFOPLIST_KEY_UILaunchScreen_Generation: YES
      INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
      INFOPLIST_KEY_CFBundleDisplayName: "bpTracker"
      INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleDefault
      PRODUCT_BUNDLE_IDENTIFIER: com.greenhealer1026.bptracker2026
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: 1
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      INFOPLIST_KEY_NSHealthShareUsageDescription: "此应用需要访问您的健康数据以导入血压和心率记录"
      INFOPLIST_KEY_NSHealthUpdateUsageDescription: "此应用需要写入健康数据以保存血压记录"
